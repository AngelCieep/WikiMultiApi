<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" routerLink="/">WikiMultiApi</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- Barra de búsqueda centrada -->
            <form class="d-flex mx-auto position-relative" style="width: 340px" (submit)="submitSearch(); $event.preventDefault()">
                <input
                    class="form-control me-2"
                    type="search"
                    placeholder="Buscar universo..."
                    [(ngModel)]="searchQuery"
                    name="searchQuery"
                    (ngModelChange)="onSearch()"
                    (blur)="clearSearch()"
                    autocomplete="off"
                />
                <button class="btn btn-outline-light" type="submit">
                    <i class="bi bi-search"></i> Buscar
                </button>
                <!-- Dropdown resultados AJAX -->
                @if (searchResults.length > 0) {
                    <ul class="list-group position-absolute top-100 start-0 w-100 shadow z-3 mt-1">
                        @for (universe of searchResults; track universe._id) {
                            <li
                                class="list-group-item list-group-item-action d-flex align-items-center gap-2"
                                (mousedown)="goToUniverse(universe.slug)">
                                @if (universe.logo) {
                                    <img [src]="universe.logo" width="24" height="24" style="object-fit:contain">
                                }
                                <span>{{ universe.name }}</span>
                            </li>
                        }
                    </ul>
                }
            </form>

            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/universes" routerLinkActive="active">Universos</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
