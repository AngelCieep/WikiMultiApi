<nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: #7D2424;">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold fs-4" routerLink="/" style="font-family: 'Crimson Text', Georgia, serif;">
      <i class="bi bi-collection-fill me-2 text-warning"></i>
      WikiMultiApi
    </a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <!-- Search Bar -->
      <div class="row w-100 justify-content-center align-items-center">
        <div class="col-10 col-md-7 col-lg-5">
          <form (ngSubmit)="handleSearch($event)">
            <div class="input-group input-group-sm">
              <input
                type="search"
                class="form-control border-end-0"
                placeholder="Buscar universo..."
                [value]="searchInput()"
                (input)="searchInput.set($any($event.target).value)"
              />
              <button
                *ngIf="searchInput()"
                type="button"
                class="btn btn-outline-light"
                (click)="clearSearch()"
                title="Limpiar"
              >
                <i class="bi bi-x-lg"></i>
              </button>
              <button type="submit" class="btn btn-outline-light">
                <i class="bi bi-search"></i>
              </button>
            </div>
          </form>
        </div>
        <div class="col-auto ms-auto">
          <a routerLink="/universo/agregar" class="btn btn-sm btn-outline-light me-2">
            <i class="bi bi-plus-circle me-1"></i>
            Agregar Universo
          </a>
          <a routerLink="/doc" class="btn btn-sm btn-outline-warning">
            <i class="bi bi-book me-1"></i>
            Documentación
          </a>
        </div>
      </div>
    </div>
  </div>
</nav>
