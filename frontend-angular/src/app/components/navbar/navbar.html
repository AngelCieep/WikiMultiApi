<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container navbar-container">
        <a class="navbar-brand fw-bold" routerLink="/">WikiMultiApi</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- Barra de búsqueda centrada absolutamente -->
            <form class="navbar-search-form" (submit)="submitSearch(); $event.preventDefault()">
                <div class="btn-group">
                    <button type="button" class="btn btn-secondary btn-sm dropdown-toggle navbar-search-type-btn" data-bs-toggle="dropdown" aria-expanded="false">
                        {{ searchTypeLabel }}
                    </button>
                    <ul class="dropdown-menu">
                        <li><button class="dropdown-item" type="button" (click)="setSearchType('universes', 'Universos')">Universos</button></li>
                        <li><button class="dropdown-item" type="button" (click)="setSearchType('characters', 'Personajes')">Personajes</button></li>
                    </ul>
                </div>
                <input
                    class="navbar-search-input"
                    type="search"
                    [placeholder]="searchType === 'characters' ? 'Buscar personaje...' : 'Buscar universo...'"
                    [(ngModel)]="searchQuery"
                    name="searchQuery"
                    autocomplete="off"
                />
                <button class="navbar-search-submit" type="submit">
                    <i class="bi bi-search"></i>
                </button>
            </form>

            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/universes" routerLinkActive="active">Universos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/characters" routerLinkActive="active">Personajes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/documentation" routerLinkActive="active">API</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
